                    {m.width&&m.height&&<text x={x+w/2} y={y+h/2+8} textAnchor="middle" fill="var(--txt2)" fontSize="8" fontFamily="Space Mono,monospace">{m.width}×{m.height}</text>}
                  </g>;
                })}
              </svg>
            );
          })()}
        </div>
      </div>}
    </div>
  );
}

/* ─── AUDIO MONITOR ───────────────────────────────────────────────────────── */
/* ─── AUDIO HELPERS (top-level) ──────────────────────────────────────────── */
function VuMeter({volPct, muted}){
  const canvasL=useRef(null), canvasR=useRef(null);
  const animRef=useRef(null), tRef=useRef(0);

  useEffect(()=>{
    const segs=20, segH=5, gap=2, w=20;
    const totalH=segs*(segH+gap);
    [canvasL,canvasR].forEach(cr=>{ if(cr.current){cr.current.width=w;cr.current.height=totalH;}});

    const draw=()=>{
      tRef.current+=0.06;
      const base=(muted?0:volPct)/100;
      const vals=[
        Math.max(0,Math.min(1,base*0.9+Math.sin(tRef.current*2.1)*0.07+Math.random()*0.03)),
        Math.max(0,Math.min(1,base*0.9+Math.sin(tRef.current*1.7+1)*0.07+Math.random()*0.03)),
      ];
      [canvasL,canvasR].forEach((cr,ci)=>{
        const ctx=cr.current?.getContext('2d'); if(!ctx) return;
        ctx.clearRect(0,0,w,totalH);
        const v=vals[ci];
        for(let i=0;i<segs;i++){
          const thresh=i/segs;
          const active=v>thresh;
          ctx.fillStyle=active?(i>=segs*0.85?'#f43f5e':i>=segs*0.65?'#fbbf24':'#00e596'):'#1a1f35';
          const y=totalH-(i+1)*(segH+gap);
          ctx.beginPath(); ctx.rect(0,y,w,segH); ctx.fill();
        }
      });
      animRef.current=requestAnimationFrame(draw);
    };
    animRef.current=requestAnimationFrame(draw);
    return()=>cancelAnimationFrame(animRef.current);
  },[volPct, muted]);

  const segs=20, segH=5, gap=2, totalH=segs*(segH+gap);
  return(
    <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
      {[['L',canvasL],['R',canvasR]].map(([lbl,ref])=>(
        <div key={lbl} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
          <canvas ref={ref} style={{display:'block'}}/>
          <span style={{fontSize:8,color:'var(--txt2)',letterSpacing:1}}>{lbl}</span>
        </div>
      ))}
    </div>
  );
}

function AudioMonitor(){
  const [audio,setAudio]=useState({devices:[],master_volume:null,master_muted:false});
  const [vol,setVol]=useState(50);
  const [dragging,setDragging]=useState(false);
  const [msg,setMsg]=useState('');
  const [msgOk,setMsgOk]=useState(true);

  useEffect(()=>{
    const go=()=>fetch(`${API}/audio`).then(r=>r.json()).then(d=>{
      setAudio(d);
      if(!dragging && d.master_volume!=null) setVol(d.master_volume);
    }).catch(()=>{});
    go(); const id=setInterval(go,3000); return()=>clearInterval(id);
  },[dragging]);

  const flash=(txt,ok=true)=>{ setMsg(txt); setMsgOk(ok); setTimeout(()=>setMsg(''),2500); };

  const applyVol=async(v)=>{
    const r=await fetch(`${API}/audio/volume`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({volume:v})}).then(r=>r.json()).catch(()=>({ok:false,error:'Request failed'}));
    if(r.ok) flash(`✓ Volume set to ${v}%`);
    else flash(`✗ ${r.error||'Failed — try running as admin'}`,false);
  };

  const toggleMute=async()=>{
    const mute=!audio.master_muted;
    const r=await fetch(`${API}/audio/mute`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mute})}).then(r=>r.json()).catch(()=>({ok:false}));
    if(r.ok) flash(mute?'✓ Muted':'✓ Unmuted');
    else flash('✗ Could not toggle mute — try running as admin',false);
  };

  const volPct=vol??50;
  const volCol=volPct>85?'#f43f5e':volPct>60?'#fbbf24':'#00e5ff';
  const muted=audio.master_muted;
  const presets=[{l:'Mute',v:0,col:'#f43f5e'},{l:'25%',v:25,col:'#fbbf24'},{l:'50%',v:50,col:'#fbbf24'},{l:'75%',v:75,col:'#00e596'},{l:'100%',v:100,col:'#00e5ff'}];

  return(
    <div className="fade-in">
      <div className="ptitle">{I.aud} Audio Monitor</div>
      {msg&&<div style={{color:msgOk?'var(--green)':'var(--red)',fontSize:10,marginBottom:8}}>{msg}</div>}

      <div className="card" style={{marginBottom:10}}>
        <div className="ch">
          <div className="ct" style={{color:'var(--cyan)'}}>🔊 Master Volume</div>
          <button onClick={toggleMute} style={{padding:'4px 12px',background:muted?'var(--red)22':'var(--bg4)',
            border:`1px solid ${muted?'var(--red)':'var(--border2)'}`,color:muted?'var(--red)':'var(--txt2)',
            fontFamily:"'Space Mono',monospace",fontSize:9,borderRadius:2,cursor:'pointer'}}>
            {muted?'🔇 MUTED':'🔊 MUTE'}
          </button>
        </div>
        <div className="cb">
          <div style={{display:'flex',alignItems:'center',gap:20,marginBottom:14}}>
            <VuMeter volPct={volPct} muted={muted}/>
            <div style={{flex:1}}>
              <div style={{fontFamily:'Rajdhani,sans-serif',fontSize:56,fontWeight:700,
                color:muted?'var(--txt2)':volCol,lineHeight:1,marginBottom:10}}>
                {muted?<span style={{fontSize:32}}>MUTED</span>:`${volPct}%`}
              </div>
              <input type="range" min="0" max="100" value={volPct}
                style={{width:'100%',accentColor:volCol,cursor:'pointer',height:6}}
                onMouseDown={()=>setDragging(true)}
                onTouchStart={()=>setDragging(true)}
                onChange={e=>setVol(parseInt(e.target.value))}
                onMouseUp={e=>{setDragging(false);applyVol(parseInt(e.target.value));}}
                onTouchEnd={()=>{setDragging(false);applyVol(volPct);}}
              />
              <div style={{display:'flex',justifyContent:'space-between',fontSize:8,color:'var(--txt2)',marginTop:3}}>
                <span>0</span><span>25</span><span>50</span><span>75</span><span>100</span>
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:7}}>
            {presets.map(p=>(
              <button key={p.l} onClick={()=>{setVol(p.v);applyVol(p.v);}}
                style={{flex:1,padding:'6px 0',background:'var(--bg3)',
                  border:`1px solid ${volPct===p.v?p.col:'var(--border2)'}`,
                  color:volPct===p.v?p.col:'var(--txt2)',
                  fontFamily:"'Space Mono',monospace",fontSize:9,borderRadius:2,cursor:'pointer'}}>
                {p.l}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="card" style={{marginBottom:10}}>
        <div className="ch">
          <div className="ct" style={{color:'var(--green)'}}>🎧 Playback Devices</div>
          <span style={{fontSize:9,color:'var(--txt2)'}}>{audio.devices.length} detected</span>
        </div>
        <div className="cb">
          {audio.devices.length===0&&<div style={{fontSize:10,color:'var(--txt2)',padding:'8px 0'}}>No devices detected. Windows only.</div>}
          {audio.devices.map((d,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
              <div style={{width:36,height:36,borderRadius:'50%',flexShrink:0,
                background:d.is_default?'var(--cyan)22':'var(--bg3)',
                border:`1px solid ${d.is_default?'var(--cyan)':'var(--border2)'}`,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🔊</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:11,color:d.is_default?'var(--cyan)':'var(--txt0)'}}>{d.name}</div>
                <div style={{fontSize:9,color:'var(--txt2)',marginTop:2}}>{d.manufacturer||'Unknown manufacturer'}</div>
              </div>
              <div style={{textAlign:'right'}}>
                {d.is_default&&<div style={{fontSize:8,color:'var(--cyan)',letterSpacing:1,marginBottom:4}}>DEFAULT</div>}
                <div style={{fontSize:9,color:d.status==='OK'?'var(--green)':'var(--yellow)'}}>{d.status}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="ch"><div className="ct" style={{color:'var(--violet2)'}}>🎛 EQ Visualizer</div>
          <span style={{fontSize:9,color:'var(--txt2)'}}>display only</span>
        </div>
        <div className="cb">
          <div style={{display:'flex',gap:6,alignItems:'flex-end',height:60,padding:'4px 0'}}>
            {[32,64,125,250,500,'1k','2k','4k','8k','16k'].map((freq,i)=>{
              const col=i<3?'#00e5ff':i<6?'#00e596':i<8?'#fbbf24':'#9f5ff7';
              const h=30+Math.sin(i*1.3+(volPct/10))*20+10;
              return(
                <div key={freq} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                  <div style={{width:'100%',background:col+'33',borderRadius:2,height:40,display:'flex',alignItems:'flex-end',overflow:'hidden'}}>
                    <div style={{width:'100%',background:col,borderRadius:2,height:`${h}%`,transition:'height .5s ease'}}/>
                  </div>
                  <span style={{fontSize:7,color:'var(--txt2)'}}>{freq}</span>
                </div>
              );
            })}
          </div>
          <div style={{fontSize:9,color:'var(--txt2)',marginTop:6}}>Use Windows Sound settings for real EQ control</div>
        </div>
      </div>
    </div>
  );
}


function SettingToggle({label,desc,on,onChange}){
  return(
    <div className="set-row" onClick={()=>onChange(!on)} style={{cursor:'pointer'}}>
      <div style={{flex:1}}>
        <div className="set-lbl">{label}</div>
        {desc&&<div className="set-desc">{desc}</div>}
      </div>
      <div className={`toggle${on?' on':''}`}><div className="tknob"/></div>
    </div>
  );
}
function SettingSelect({label,desc,value,options,onChange}){
  return(
    <div className="set-row">
      <div style={{flex:1}}>
        <div className="set-lbl">{label}</div>
        {desc&&<div className="set-desc">{desc}</div>}
      </div>
      <select className="set-sel" value={value}
        onChange={e=>{e.stopPropagation();onChange(e.target.value);}}>
        {options.map(([v,l])=><option key={v} value={v}>{l}</option>)}
      </select>
    </div>
  );
}

function Settings({sys,stats,cfg,onCfgChange}){
  const [saved,setSaved]=useState('');
  const [accentCol,setAccentCol]=useState(cfg.accent_color||'#00e5ff');

  const patch=async(key,val)=>{
    onCfgChange(key,val);
    try{
      await fetch(`${API}/config`,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({[key]:val})});
      setSaved('✓ Saved');setTimeout(()=>setSaved(''),1500);
    }catch{}
  };

  const applyAccent=(col)=>{
    setAccentCol(col);
    document.documentElement.style.setProperty('--cyan',col);
    patch('accent_color',col);
  };

  const exportData=()=>{
    const blob=new Blob([JSON.stringify({system:sys,snapshot:stats,exported:new Date().toISOString()},null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`novapulse_${Date.now()}.json`;a.click();
  };

  const g=(k,def)=>cfg[k]??def;
  const accents=['#00e5ff','#00e596','#9f5ff7','#f43f5e','#fbbf24','#ff6b35','#ec4899','#38bdf8'];

  return(
    <div className="fade-in">
      <div className="ptitle">{I.set} Settings</div>
      {saved&&<div style={{color:'var(--green)',fontSize:10,marginBottom:8,textAlign:'right'}}>{saved}</div>}

      <div className="card" style={{marginBottom:10}}>
        <div className="ch"><div className="ct" style={{color:'var(--cyan)'}}>🎨 Display</div></div>
        <div className="cb">
          <SettingToggle label="Show CPU Core Breakdown" desc="Per-core bars in Monitor tab"
            on={g('show_cores',true)} onChange={v=>patch('show_cores',v)}/>
          <SettingToggle label="Show Process List" desc="Top processes in Monitor tab"
            on={g('show_procs',true)} onChange={v=>patch('show_procs',v)}/>
          <SettingToggle label="Show Network Speed" desc="Upload/download on Overview"
            on={g('show_network',true)} onChange={v=>patch('show_network',v)}/>
          <SettingSelect label="Temperature Unit" value={g('temp_unit','C')}
            options={[['C','Celsius (°C)'],['F','Fahrenheit (°F)']]}
            onChange={v=>patch('temp_unit',v)}/>
          <SettingSelect label="FPS Target" desc="Highlight games hitting this target"
            value={g('fps_target','60')}
            options={[['30','30 FPS'],['60','60 FPS'],['120','120 FPS'],['144','144 FPS'],['165','165 FPS'],['240','240 FPS']]}
            onChange={v=>patch('fps_target',v)}/>
          <div className="set-row">
            <div style={{flex:1}}><div className="set-lbl">Accent Color</div><div className="set-desc">UI highlight color — takes effect immediately</div></div>
            <div style={{display:'flex',gap:5}}>
              {accents.map(c=>(
                <div key={c} onClick={()=>applyAccent(c)}
                  style={{width:16,height:16,borderRadius:'50%',background:c,cursor:'pointer',
                    border:accentCol===c?'2px solid #fff':'2px solid transparent',flexShrink:0}}/>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div className="card" style={{marginBottom:10}}>
        <div className="ch"><div className="ct" style={{color:'var(--green)'}}>📊 Monitoring</div></div>
        <div className="cb">
          <SettingSelect label="Poll Rate" desc="How often live stats refresh"
            value={g('poll_rate','1000')}
            options={[['500','500ms'],['1000','1s (default)'],['2000','2s'],['5000','5s']]}
            onChange={v=>patch('poll_rate',v)}/>
          <SettingSelect label="Process Count" desc="Processes shown in Monitor tab"
            value={g('proc_count','8')}
            options={[['5','5'],['8','8 (default)'],['12','12'],['20','20']]}
            onChange={v=>patch('proc_count',v)}/>
          <SettingToggle label="GPU Monitoring" desc="PowerShell polling every 10s on Windows"
            on={g('gpu_enabled',true)} onChange={v=>patch('gpu_enabled',v)}/>
          <SettingToggle label="Temperature Monitoring" desc="WMI sensor reading on Windows"
            on={g('temp_enabled',true)} onChange={v=>patch('temp_enabled',v)}/>
        </div>
      </div>

      <div className="card" style={{marginBottom:10}}>
        <div className="ch"><div className="ct" style={{color:'var(--yellow)'}}>🔔 Alerts</div><span style={{fontSize:9,color:'var(--txt2)'}}>browser notifications</span></div>
        <div className="cb">
          <SettingToggle label="CPU Alert" desc="Notify when CPU usage spikes"
            on={g('alert_cpu',true)} onChange={v=>patch('alert_cpu',v)}/>
          <SettingSelect label="CPU Threshold" value={g('alert_cpu_pct','85')}
            options={[['70','70%'],['80','80%'],['85','85% (default)'],['90','90%'],['95','95%']]}
            onChange={v=>patch('alert_cpu_pct',v)}/>
          <SettingToggle label="RAM Alert" desc="Notify when RAM usage is high"
            on={g('alert_ram',true)} onChange={v=>patch('alert_ram',v)}/>
          <SettingSelect label="RAM Threshold" value={g('alert_ram_pct','85')}
            options={[['70','70%'],['80','80%'],['85','85% (default)'],['90','90%'],['95','95%']]}
            onChange={v=>patch('alert_ram_pct',v)}/>
          <SettingToggle label="Temperature Alert" desc="Notify on high temps"
            on={g('alert_temp',true)} onChange={v=>patch('alert_temp',v)}/>
          <SettingSelect label="Temp Threshold" value={g('alert_temp_c','85')}
            options={[['70','70°C'],['75','75°C'],['80','80°C'],['85','85°C (default)'],['90','90°C'],['95','95°C']]}
            onChange={v=>patch('alert_temp_c',v)}/>
        </div>
      </div>

      <div className="card" style={{marginBottom:10}}>
        <div className="ch"><div className="ct" style={{color:'var(--violet2)'}}>💾 Data</div></div>
        <div className="cb">
          <div className="set-row">
            <div style={{flex:1}}><div className="set-lbl">Export Snapshot</div><div className="set-desc">Save current stats as JSON</div></div>
            <button className="key-btn" onClick={exportData}>Export</button>
          </div>
        </div>
      </div>

      <div className="card" style={{marginBottom:10}}>
        <div className="ch"><div className="ct">🖥️ System Specs</div><span style={{fontSize:9,color:'var(--txt2)'}}>detected at launch</span></div>
        <div className="cb">
          <div className="spec-grid">
            {[['CPU',sys.cpu_name],['Config',`${sys.cpu_cores}C/${sys.cpu_threads}T @ ${sys.cpu_freq_max}GHz`],
              ['RAM',`${sys.ram_gb}GB ${sys.ram_type||''}`],['GPU',sys.gpu_name],
              ['GPU Tier',`${sys.gpu_tier}/5`],['OS',sys.os||''],
              ['Hostname',sys.hostname],['Arch',sys.arch],
              ['Boot',sys.boot_time],['Uptime',sys.uptime],
            ].map(([k,v])=>(
              <div key={k} className="spec-item">
                <div className="spec-k">{k}</div>
                <div className="spec-v" style={{wordBreak:'break-word'}}>{v||'N/A'}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="card">
        <div className="ch"><div className="ct">ℹ️ About</div></div>
        <div className="cb">
          <div className="spec-grid">
            {[['Version','2.0.0'],['Backend','Flask + psutil'],
              ['Frontend','React 18 + Babel'],['AI','Groq llama-3.1-8b'],
              ['Games DB','219 titles'],['Port','7842'],
            ].map(([k,v])=>(
              <div key={k} className="spec-item"><div className="spec-k">{k}</div><div className="spec-v">{v}</div></div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}


/* ─── APP ─────────────────────────────────────────────────────────────────── */
function App(){
  const [tab,setTab]=useState('overview');
  const [sys,setSys]=useState({gpu_tier:1,disks:[],cpu_name:'...',gpu_name:'...'});
  const [stats,setStats]=useState({cpu:0,ram:0,gpu:0,temps:{},processes:[],cpu_cores:[]});
  const [games,setGames]=useState([]);
  const [time,setTime]=useState(new Date());
  const [ok,setOk]=useState(false);
  const [cfg,setCfg]=useState({
    show_cores:true,show_procs:true,show_network:true,
    temp_unit:'C',fps_target:'60',poll_rate:'1000',proc_count:'8',
    gpu_enabled:true,temp_enabled:true,
    alert_cpu:true,alert_cpu_pct:'85',
    alert_ram:true,alert_ram_pct:'85',
    alert_temp:true,alert_temp_c:'85',
    accent_color:'#00e5ff',
  });
  const alertedRef=useRef({});

  // Load config once on mount
  useEffect(()=>{
    fetch(`${API}/config`).then(r=>r.json()).then(d=>{
      if(d&&Object.keys(d).length) setCfg(prev=>({...prev,...d}));
      if(d.accent_color) document.documentElement.style.setProperty('--cyan',d.accent_color);
    }).catch(()=>{});
  },[]);

  const handleCfgChange=(key,val)=>{
    setCfg(prev=>({...prev,[key]:val}));
  };

  useEffect(()=>{
    if(window.__npLoaderDone) window.__npLoaderDone();
    fetch(`${API}/system`).then(r=>r.json()).then(d=>{setSys(d);setOk(true);}).catch(()=>{});
    fetch(`${API}/games`).then(r=>r.json()).then(d=>setGames(d.games||[])).catch(()=>{});
  },[]);

  // Respects poll_rate setting
  useEffect(()=>{
    const rate=parseInt(cfg.poll_rate)||1000;
    const go=()=>fetch(`${API}/stats`).then(r=>r.json()).then(d=>{setStats(d);setOk(true);}).catch(()=>setOk(false));
    go(); const id=setInterval(go,rate); return()=>clearInterval(id);
  },[cfg.poll_rate]);

  useEffect(()=>{const id=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(id);},[]);

  // Browser notification alerts
  useEffect(()=>{
    const now=Date.now();
    const check=(key,val,thresh,label)=>{
      if(!cfg[key]) return;
      const limit=parseInt(cfg[thresh])||85;
      const alKey=key+thresh;
      if(val>=limit){
        if(!alertedRef.current[alKey]||now-alertedRef.current[alKey]>30000){
          alertedRef.current[alKey]=now;
          if(Notification.permission==='granted')
            new Notification(`NovaPulse Alert: ${label}`,{body:`${label} at ${Math.round(val)}% (threshold ${limit}%)`,icon:''});
        }
      } else { delete alertedRef.current[alKey]; }
    };
    check('alert_cpu',stats.cpu||0,'alert_cpu_pct','CPU Usage');
    check('alert_ram',stats.ram||0,'alert_ram_pct','RAM Usage');
    const maxTemp=Math.max(0,...Object.values(stats.temps||{}));
    if(maxTemp>0) check('alert_temp',maxTemp,'alert_temp_c','Temperature');
  },[stats,cfg]);

  // Request notification permission once
  useEffect(()=>{
    if(Notification.permission==='default') Notification.requestPermission();
  },[]);

  const nav=[
    {k:'overview',  l:'Overview',    i:I.lay},
    {k:'monitor',   l:'Monitor',     i:I.cpu},
    {k:'history',   l:'History',     i:I.hist},
    {k:'games',     l:'Games',       i:I.gam, b:games.length||''},
    {k:'launcher',  l:'Launcher',    i:I.launch},
    {k:'benchmark', l:'Benchmark',   i:I.bm},
    {k:'processes', l:'Processes',   i:I.proc},
    {k:'cleaner',   l:'Cleaner',     i:I.clean},
    {k:'monitors',  l:'Displays',    i:I.mon},
    {k:'audio',     l:'Audio',       i:I.aud},
    {k:'ai',        l:'AI Optimizer',i:I.ai},
    {k:'settings',  l:'Settings',    i:I.set},
  ];

  // Temp display helper respecting unit setting
  const fmtTemp=(t)=>t==null?'—':cfg.temp_unit==='F'?`${Math.round(t*9/5+32)}°F`:`${t}°C`;

  return <>
    <div className="topbar">
      <div className="logo">{I.logo} NovaPulse <span className="logo-sub">2.0</span></div>
      <div className="topbar-r">
        {ok?<><div className="live-dot"/><span style={{fontSize:10,color:'var(--green)'}}>LIVE</span></>
          :<span style={{fontSize:10,color:'var(--red)',animation:'pulse 1s infinite'}}>CONNECTING…</span>}
        <div className="tb-stat">CPU <span className="tb-val" style={{color:vCol(stats.cpu||0)}}>{Math.round(stats.cpu||0)}%</span></div>
        <div className="tb-stat">RAM <span className="tb-val" style={{color:vCol(stats.ram||0)}}>{Math.round(stats.ram||0)}%</span></div>
        {(stats.gpu_temp||0)>0&&<div className="tb-stat">GPU <span className="tb-val">{fmtTemp(stats.gpu_temp)}</span></div>}
        <div className="tb-time">{time.toLocaleTimeString()}</div>
      </div>
    </div>
    <div className="layout">
      <div className="sidebar">
        <div className="nav-sect">Menu</div>
        {nav.map(n=>(
          <div key={n.k} className={`nav-item${tab===n.k?' active':''}`} onClick={()=>setTab(n.k)}>
            {n.i}{n.l}{n.b?<span className="nav-badge">{n.b}</span>:null}
          </div>
        ))}
        <div className="nav-div"/>
        <div className="tier-box">
          <div className="tier-lbl">GPU Tier</div>
          <div className="tier-stars" style={{color:TCOLS[sys.gpu_tier||1]}}>{'★'.repeat(sys.gpu_tier||1)}{'☆'.repeat(5-(sys.gpu_tier||1))}</div>
          <div className="tier-name" style={{color:TCOLS[sys.gpu_tier||1]}}>{TNAMES[sys.gpu_tier||1]||'...'}</div>
          <div className="tier-gpu">{(sys.gpu_name||'Detecting…').slice(0,28)}</div>
        </div>
      </div>
      <div className="main">
        <div style={{display:tab==='overview'  ?'block':'none'}}><Overview  sys={sys} stats={stats} cfg={cfg} fmtTemp={fmtTemp}/></div>
        <div style={{display:tab==='monitor'   ?'block':'none'}}><Monitor   sys={sys} stats={stats} cfg={cfg} fmtTemp={fmtTemp}/></div>
        <div style={{display:tab==='history'   ?'block':'none'}}><History/></div>
        <div style={{display:tab==='games'     ?'block':'none'}}><Games     sys={sys} games={games} cfg={cfg}/></div>
        <div style={{display:tab==='launcher'  ?'block':'none'}}><Launcher/></div>
        <div style={{display:tab==='benchmark' ?'block':'none'}}><Benchmark sys={sys}/></div>
        <div style={{display:tab==='processes' ?'block':'none'}}><ProcessManager/></div>
        <div style={{display:tab==='cleaner'   ?'block':'none'}}><Cleaner/></div>
        <div style={{display:tab==='monitors'  ?'block':'none'}}><Monitors/></div>
        <div style={{display:tab==='audio'     ?'block':'none'}}><AudioMonitor/></div>
        <div style={{display:tab==='ai'        ?'block':'none'}}><AI        sys={sys} stats={stats}/></div>
        <div style={{display:tab==='settings'  ?'block':'none'}}><Settings  sys={sys} stats={stats} cfg={cfg} onCfgChange={handleCfgChange}/></div>
      </div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
