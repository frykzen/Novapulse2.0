<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NovaPulse 2.0</title>
<script src="/vendor/react.js" onerror="this._err=true"></script>
<script src="/vendor/react-dom.js" onerror="this._err=true"></script>
<script src="/vendor/babel.js" onerror="this._err=true"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#060810;--bg1:#0b0e1a;--bg2:#111422;--bg3:#181c2e;--bg4:#1f2438;
  --border:#252a40;--border2:#2e3450;
  --cyan:#00e5ff;--cyan2:#00b8d9;--violet:#7c3aed;--violet2:#9f5ff7;
  --green:#00e596;--yellow:#fbbf24;--red:#f43f5e;--orange:#fb923c;
  --txt0:#e8eaff;--txt1:#8890b8;--txt2:#454d70;
}
html,body,#root{width:100%;height:100%;background:var(--bg0);color:var(--txt0);
  font-family:'Space Mono',monospace;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .3s ease both}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,#00e5ff08 2px,#00e5ff08 4px)}

.topbar{display:flex;align-items:center;padding:0 18px;height:50px;background:var(--bg1);
  border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.logo{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700;color:var(--cyan);
  letter-spacing:3px;display:flex;align-items:center;gap:9px}
.logo svg{width:22px;height:22px}
.logo-sub{font-size:10px;color:var(--txt2);letter-spacing:1px;font-weight:400;margin-left:2px}
.topbar-r{display:flex;gap:16px;margin-left:auto;align-items:center;font-size:11px}
.tb-stat{display:flex;align-items:center;gap:6px;color:var(--txt1)}
.tb-val{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600}
.tb-time{font-size:10px;color:var(--txt2);padding-left:14px;border-left:1px solid var(--border)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}

.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:196px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:14px 0}
.main{flex:1;overflow-y:auto;padding:18px 20px;background:var(--bg0)}

.nav-sect{padding:0 12px;margin:8px 0 4px;font-size:9px;letter-spacing:2px;
  color:var(--txt2);text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 15px;cursor:pointer;
  font-size:11px;color:var(--txt1);border-left:2px solid transparent;transition:all .14s}
.nav-item:hover{color:var(--txt0);background:var(--bg2)}
.nav-item.active{color:var(--cyan);background:var(--bg2);border-left-color:var(--cyan)}
.nav-item svg{width:13px;height:13px;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:9px;padding:1px 6px;border-radius:999px;
  background:var(--bg3);color:var(--cyan)}
.nav-div{height:1px;background:var(--border);margin:10px 12px}

.tier-box{margin:auto 11px 10px;padding:11px 12px;background:var(--bg2);
  border:1px solid var(--border);border-radius:3px}
.tier-lbl{font-size:9px;color:var(--txt2);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.tier-stars{font-size:15px;letter-spacing:1px;margin-bottom:3px}
.tier-name{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600}
.tier-gpu{font-size:9px;color:var(--txt2);margin-top:4px;word-break:break-word;line-height:1.4}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.ch{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;
  border-bottom:1px solid var(--border)}
.ct{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;display:flex;align-items:center;gap:7px}
.ct svg{width:12px;height:12px}
.cb{padding:13px}

.grid{display:grid;gap:12px;margin-bottom:12px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}

.gauge-card{display:flex;flex-direction:column;align-items:center;padding:14px 10px}
.gauge-wrap{position:relative;width:108px;height:68px}
.gauge-wrap svg{width:108px;height:68px}
.gauge-val{position:absolute;bottom:0;left:50%;transform:translateX(-50%);text-align:center}
.gauge-num{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;line-height:1}
.gauge-unit{font-size:8px;color:var(--txt2)}
.gauge-lbl{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;color:var(--txt1);margin-top:6px}
.gauge-sub{font-size:9px;color:var(--txt2);margin-top:2px}

canvas.spark{display:block;width:100%;height:58px}
.sk-hdr{padding:11px 13px 7px;display:flex;align-items:center;justify-content:space-between}
.sk-ttl{font-size:10px;color:var(--txt1);letter-spacing:1px}
.sk-val{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700}

.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.bar-lbl{font-size:9px;color:var(--txt2);width:38px;text-align:right;flex-shrink:0}
.bar-tr{flex:1;height:5px;background:var(--bg3);border-radius:1px;overflow:hidden}
.bar-fi{height:100%;border-radius:1px;transition:width .5s}
.bar-v{font-size:9px;color:var(--txt1);width:30px;text-align:right}

.sr{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;
  border-bottom:1px solid var(--border);font-size:10px}
.sr:last-child{border-bottom:none}
.sk{color:var(--txt2)}
.sv{color:var(--txt0);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:500}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:12px}
.set-row:last-child{border-bottom:none}
.set-lbl{font-size:11px;color:var(--txt0);font-weight:600}
.set-desc{font-size:9px;color:var(--txt2);margin-top:2px}
.set-sel{background:var(--bg2);border:1px solid var(--border);color:var(--txt0);padding:4px 7px;border-radius:4px;font-size:10px;cursor:pointer;flex-shrink:0}
.toggle{width:32px;height:17px;border-radius:9px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--cyan)}
.tknob{position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on .tknob{left:17px}

.proc-t{width:100%;border-collapse:collapse;font-size:10px}
.proc-t th{padding:5px 8px;font-size:9px;letter-spacing:1px;color:var(--txt2);
  background:var(--bg3);text-align:left;font-weight:400;text-transform:uppercase}
.proc-t td{padding:4px 8px;border-bottom:1px solid var(--border)}
.proc-t tr:hover td{background:var(--bg3)55}

.gt{width:100%;border-collapse:collapse}
.gt th{padding:7px 11px;font-size:9px;letter-spacing:1.5px;color:var(--txt2);
  background:var(--bg3);text-align:left;font-weight:400;text-transform:uppercase;white-space:nowrap}
.gt td{padding:6px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
.gt tr:hover td{background:var(--bg3)44}
.gn{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600}
.gp{font-size:9px;color:var(--txt2)}
.fps{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700}
.frat{font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:700}
.gf-bar{width:140px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.gf-fill{height:100%;border-radius:2px}

.gfilter{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.gfilter input{flex:1;background:var(--bg2);border:1px solid var(--border2);color:var(--txt0);
  padding:7px 11px;font-family:'Space Mono',monospace;font-size:10px;outline:none;border-radius:2px}
.gfilter input:focus{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan)22}
.gfilter input::placeholder{color:var(--txt2)}

.opt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.opt-btn{padding:9px 12px;background:var(--bg2);border:1px solid var(--border2);
  color:var(--txt1);font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;
  border-radius:2px;text-align:left;transition:all .13s;line-height:1.6}
.opt-btn:hover{border-color:var(--cyan)55;color:var(--txt0)}
.opt-btn.sel{border-color:var(--cyan);color:var(--cyan);background:var(--cyan)0d}
.run-btn{padding:10px 22px;background:var(--cyan);color:var(--bg0);
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;
  border:none;cursor:pointer;border-radius:2px;display:inline-flex;align-items:center;gap:7px;
  transition:all .14s;text-transform:uppercase}
.run-btn:hover:not(:disabled){background:var(--cyan2)}
.run-btn:disabled{background:var(--bg4);color:var(--txt2);cursor:not-allowed}
.ai-out{background:var(--bg1);border:1px solid var(--border);padding:14px 16px;
  font-size:10px;line-height:1.85;min-height:180px;max-height:400px;overflow-y:auto;
  white-space:pre-wrap;border-radius:2px;margin-top:11px;color:var(--txt0)}

.key-row{display:flex;gap:7px;margin-bottom:10px}
.key-in{flex:1;background:var(--bg2);border:1px solid var(--border2);color:var(--txt0);
  padding:8px 11px;font-family:'Space Mono',monospace;font-size:10px;outline:none;border-radius:2px}
.key-in:focus{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan)1a}
.key-btn{padding:8px 12px;background:var(--bg3);border:1px solid var(--border2);color:var(--txt1);
  font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;border-radius:2px;white-space:nowrap}
.key-btn:hover{border-color:var(--cyan)55;color:var(--cyan)}
.status{font-size:10px;margin-bottom:9px;min-height:15px}
.s-ok{color:var(--green)}.s-err{color:var(--red)}.s-load{color:var(--yellow);animation:pulse 1s infinite}

.temp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:7px}
.tp{padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:3px}
.tp-n{font-size:8px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.tp-v{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700}

.net-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.net-row:last-child{border-bottom:none}
.nl{font-size:10px;color:var(--txt2)}
.nv{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600}

.ptitle{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ptitle svg{width:15px;height:15px;flex-shrink:0}
.ptitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}

.core-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.ci{display:flex;align-items:center;gap:4px}
.cid{font-size:8px;color:var(--txt2);width:16px}
.cbar{flex:1;height:5px;background:var(--bg3);border-radius:1px;overflow:hidden}
.cfill{height:100%;border-radius:1px;transition:width .5s}
.cpct{font-size:8px;color:var(--txt1);width:26px;text-align:right}

.sc{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:18px;margin-bottom:12px}
.sc-t{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--cyan);margin-bottom:3px}
.sc-s{font-size:10px;color:var(--txt2);margin-bottom:12px}
.sc-div{height:1px;background:var(--border);margin:10px 0}
.spec-grid{display:grid;grid-template-columns:repeat(2,1fr)}
.spec-item{padding:7px 10px;border-bottom:1px solid var(--border)}
.spec-k{font-size:8px;color:var(--txt2);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.spec-v{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:500;word-break:break-word}
.spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--cyan);
  border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}

.chat-wrap{display:flex;flex-direction:column;gap:8px;margin-top:11px}
.chat-row{display:flex;gap:7px;align-items:flex-end}
.chat-in{flex:1;background:var(--bg2);border:1px solid var(--border2);color:var(--txt0);
  padding:9px 12px;font-family:'Space Mono',monospace;font-size:10px;outline:none;border-radius:2px;
  resize:none;line-height:1.6;min-height:38px}
.chat-in:focus{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan)1a}
.chat-in::placeholder{color:var(--txt2)}
.chat-send{padding:9px 14px;background:var(--cyan);color:var(--bg0);font-family:'Rajdhani',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:1px;border:none;cursor:pointer;border-radius:2px;
  white-space:nowrap;transition:background .13s}
.chat-send:hover:not(:disabled){background:var(--cyan2)}
.chat-send:disabled{background:var(--bg4);color:var(--txt2);cursor:not-allowed}

.bm-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.bm-card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:16px}
.bm-lbl{font-size:9px;color:var(--txt2);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.bm-score{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;line-height:1}
.bm-bar{height:5px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px}
.bm-fill{height:100%;border-radius:2px;transition:width 1s ease}
.bm-overall{grid-column:1/-1;display:flex;align-items:center;gap:20px;padding:20px}
.bm-big{font-family:'Rajdhani',sans-serif;font-size:64px;font-weight:700;line-height:1}
.bm-desc{flex:1}
.bm-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.bm-sub{font-size:10px;color:var(--txt2);line-height:1.8}

/* ── History Chart ── */
.hist-wrap{margin-bottom:12px}
.hist-label{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;display:flex;justify-content:space-between}
.hist-svg{width:100%;overflow:visible;display:block}
.hist-grid-line{stroke:var(--border);stroke-width:.5;stroke-dasharray:2 4}
.hist-axis{font-size:8px;fill:var(--txt2);font-family:'Space Mono',monospace}
.hist-time-controls{display:flex;gap:6px;margin-bottom:10px}
.hist-btn{padding:4px 10px;background:var(--bg3);border:1px solid var(--border2);color:var(--txt2);
  font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;border-radius:2px;transition:all .12s}
.hist-btn.active{border-color:var(--cyan);color:var(--cyan);background:var(--cyan)11}
.hist-card{background:var(--bg1);border:1px solid var(--border);border-radius:3px;padding:14px 16px;margin-bottom:10px}
.hist-stat-row{display:flex;gap:18px;margin-bottom:6px}
.hist-stat{display:flex;flex-direction:column}
.hist-stat-lbl{font-size:8px;color:var(--txt2);letter-spacing:1px;text-transform:uppercase}
.hist-stat-val{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;line-height:1.2}

/* ── Process Manager ── */
.pm-bar{height:3px;background:var(--bg3);border-radius:1px;overflow:hidden;margin-top:2px;width:60px}
.pm-fill{height:100%;border-radius:1px}
.pm-table{width:100%;border-collapse:collapse}
.pm-table th{padding:6px 10px;font-size:8px;letter-spacing:1.5px;color:var(--txt2);background:var(--bg3);text-align:left;font-weight:400;text-transform:uppercase;white-space:nowrap;cursor:pointer;user-select:none}
.pm-table th:hover{color:var(--txt0)}
.pm-table td{padding:5px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.pm-table tr:hover td{background:var(--bg3)55}
.pm-name{font-size:10px;font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pm-val{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600}
.pm-btn{padding:3px 7px;background:var(--bg4);border:1px solid var(--border2);color:var(--txt2);
  font-family:'Space Mono',monospace;font-size:8px;cursor:pointer;border-radius:2px;transition:all .1s;white-space:nowrap}
.pm-btn:hover{border-color:var(--red)88;color:var(--red)}
.pm-btn.prio:hover{border-color:var(--yellow)88;color:var(--yellow)}
.pm-search{background:var(--bg2);border:1px solid var(--border2);color:var(--txt0);
  padding:7px 11px;font-family:'Space Mono',monospace;font-size:10px;outline:none;border-radius:2px;width:100%;margin-bottom:10px}
.pm-search:focus{border-color:var(--cyan)}
.pm-select{background:var(--bg2);border:1px solid var(--border2);color:var(--txt0);padding:3px 6px;
  font-family:'Space Mono',monospace;font-size:9px;border-radius:2px;cursor:pointer}

/* ── Cleaner ── */
.cl-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.cl-row:last-child{border-bottom:none}
.cl-check{width:14px;height:14px;accent-color:var(--cyan);cursor:pointer;flex-shrink:0}
.cl-name{font-size:10px;font-weight:600;flex:1}
.cl-size{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;min-width:60px;text-align:right}
.cl-count{font-size:9px;color:var(--txt2);min-width:60px;text-align:right}
.cl-total{display:flex;align-items:center;justify-content:space-between;padding:10px 0 0;font-size:10px;color:var(--txt2)}
.cl-ram-box{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.startup-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:10px}
.startup-hive{padding:1px 5px;background:var(--bg4);border-radius:2px;font-size:8px;color:var(--txt2);white-space:nowrap;flex-shrink:0}

/* ── Launcher ── */
.launcher-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px;margin-bottom:14px}
.launcher-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden;
  cursor:pointer;transition:all .14s;position:relative}
.launcher-card:hover{border-color:var(--cyan)66;transform:translateY(-1px)}
.launcher-card:active{transform:translateY(0)}
.launcher-img{width:100%;aspect-ratio:460/215;object-fit:cover;background:var(--bg3);display:block}
.launcher-name{font-size:9px;font-weight:600;padding:7px 8px 2px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.launcher-meta{font-size:8px;color:var(--txt2);padding:0 8px 7px;display:flex;justify-content:space-between}
.launcher-src{padding:2px 5px;border-radius:2px;font-size:8px;letter-spacing:.5px}
.launcher-src.steam{background:#1b2838;color:#66c0f4}
.launcher-src.epic{background:#2a2a2a;color:#fff}
.launcher-launch-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:#000a;opacity:0;transition:opacity .14s;font-family:'Rajdhani',sans-serif;
  font-size:16px;font-weight:700;color:var(--cyan);letter-spacing:2px}
.launcher-card:hover .launcher-launch-btn{opacity:1}
.launcher-scan-btn{padding:10px 22px;background:var(--bg3);border:1px solid var(--border2);color:var(--txt1);
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;border-radius:2px;
  cursor:pointer;transition:all .13s;text-transform:uppercase}

<script>
// Show error if scripts didn't load after a timeout
window.addEventListener('DOMContentLoaded', function() {

      document.getElementById('np-loader-msg').style.display = 'none';
      document.getElementById('np-loader-err').style.display = 'block';
    }
  }, 4000);
});
// Hide loader once React mounts (called from App component)
window.__npLoaderDone = function() {
  var el = document.getElementById('np-loader');
  if (el) { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(function(){ el.style.display='none'; }, 300); }
};

/* Sparkline */
function Sparkline({data,color,height=58}){
  const ref=useRef(null);
  useEffect(()=>{
    const c=ref.current; if(!c) return;
    const W=c.clientWidth||200,H=height;
    c.width=W; c.height=H;
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,W,H);
    const pts=data, n=pts.length; if(n<2) return;
    const xs=pts.map((_,i)=>(i/(n-1))*W);
    const ys=pts.map(v=>H-(v/100)*H*0.88-4);
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,color+'55'); g.addColorStop(1,color+'04');
    ctx.beginPath(); ctx.moveTo(0,H);
    xs.forEach((x,i)=>ctx.lineTo(x,ys[i]));
    ctx.lineTo(W,H); ctx.closePath(); ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.moveTo(xs[0],ys[0]);
    for(let i=1;i<n;i++) ctx.lineTo(xs[i],ys[i]);
    ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.stroke();
    const lx=xs[n-1],ly=ys[n-1];
    ctx.shadowBlur=8; ctx.shadowColor=color;
    ctx.beginPath(); ctx.arc(lx,ly,3,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
    ctx.shadowBlur=0;
  },[data,color,height]);
  return <canvas ref={ref} className="spark" style={{height}} />;
}

/* Semi-gauge */
function Gauge({value,color}){
  const r=43,cx=54,cy=56;
  const pct=Math.min(1,Math.max(0,value/100));
  const toXY=deg=>{const rd=(180-deg)*Math.PI/180;return{x:cx+r*Math.cos(rd),y:cy-r*Math.sin(rd)}};
  const ang=pct*180, lg=ang>180?1:0;
  const en=toXY(ang);
  const trackD=`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`;
  const fillD=ang>0.5?`M ${cx-r} ${cy} A ${r} ${r} 0 ${lg} 1 ${en.x} ${en.y}`:'';
  const col=value>=85?'#f43f5e':value>=70?'#fbbf24':color;
  return (
    <div className="gauge-wrap">
      <svg viewBox="0 0 108 68">
        <path d={trackD} fill="none" stroke="var(--bg3)" strokeWidth="8" strokeLinecap="round"/>
        {fillD&&<path d={fillD} fill="none" stroke={col} strokeWidth="8" strokeLinecap="round"
          style={{filter:`drop-shadow(0 0 5px ${col}99)`}}/>}
      </svg>
      <div className="gauge-val">
        <div className="gauge-num" style={{color:col}}>{Math.round(value)}<span style={{fontSize:10}}>%</span></div>
      </div>
    </div>
  );
}

/* useHistory */
function useHist(v,n=60){
  const r=useRef(Array(n).fill(0));
  useEffect(()=>{r.current=[...r.current.slice(-(n-1)),v];},[v]);
  return r.current;
}

/* SparkCard */
function SparkCard({title,value,color,history}){
  const col=vCol(value);
  return (
    <div className="card" style={{padding:0}}>
      <div className="sk-hdr">
        <span className="sk-ttl">{title}</span>
        <span className="sk-val" style={{color:col}}>{value.toFixed(1)}%</span>
      </div>
      <Sparkline data={history} color={col}/>
    </div>
  );
}

/* Bar */
function Bar({label,value,max=100,color,showVal=true}){
  const pct=Math.min(100,(value/max)*100);
  const col=color||vCol(value);
  return (
    <div className="bar-row">
      {label&&<div className="bar-lbl">{label}</div>}
      <div className="bar-tr"><div className="bar-fi" style={{width:`${pct}%`,background:col}}/></div>
      {showVal&&<div className="bar-v">{Math.round(value)}%</div>}
    </div>
  );
}

/* StatRow */
const SR = ({k,v}) => <div className="sr"><span className="sk">{k}</span><span className="sv">{v}</span></div>;

/* ─── OVERVIEW ────────────────────────────────────────────────────────────── */
function Overview({sys,stats}){
  const cpuH=useHist(stats.cpu||0), ramH=useHist(stats.ram||0), gpuH=useHist(stats.gpu||0);
  const disk=sys.disks?.[0];
  const gauges=[
    {lb:'CPU',  v:stats.cpu||0,  col:'#00e5ff',  sub:`${stats.cpu_freq||0} GHz`},
    {lb:'RAM',  v:stats.ram||0,  col:'#00e596', sub:`${stats.ram_used||0}/${stats.ram_total||0} GB`},
    {lb:'GPU',  v:stats.gpu||0,  col:'#9f5ff7',sub:stats.gpu_mem_total?`${stats.gpu_mem_used}/${stats.gpu_mem_total}MB`:'N/A'},
    {lb:'DISK', v:disk?.percent||0,col:'#fbbf24',sub:disk?`${disk.used_gb}/${disk.total_gb}GB`:''},
  ];
  return (
    <div className="fade-in">
      <div className="ptitle">{I.lay} Overview</div>
      <div className="grid g4">
        {gauges.map(g=>(
          <div key={g.lb} className="card">
            <div className="gauge-card">
              <Gauge value={g.v} color={g.col}/>
              <div className="gauge-lbl" style={{color:vCol(g.v)}}>{g.lb}</div>
              <div className="gauge-sub">{g.sub}</div>
            </div>
          </div>
        ))}
      </div>
      <div className="grid g3">
        <SparkCard title="CPU Usage" value={stats.cpu||0} history={cpuH}/>
        <SparkCard title="RAM Usage" value={stats.ram||0} history={ramH}/>
        <SparkCard title="GPU Usage" value={stats.gpu||0} history={gpuH}/>
      </div>
      <div className="grid g2">
        <div className="card">
          <div className="ch"><div className="ct" style={{color:'var(--cyan)'}}>{I.cpu} CPU & Memory</div></div>
          <div className="cb">
            {[['CPU',sys.cpu_name],['Cores/Threads',`${sys.cpu_cores}C / ${sys.cpu_threads}T`],
              ['Max Freq',`${sys.cpu_freq_max} GHz`],['RAM',`${sys.ram_gb} GB ${sys.ram_type}`],
              ['RAM Used',`${stats.ram_used||0} / ${stats.ram_total||0} GB`],['Swap',`${stats.swap||0}%`]]
              .map(([k,v])=><SR key={k} k={k} v={v}/>)}
          </div>
        </div>
        <div className="card">
          <div className="ch"><div className="ct" style={{color:'var(--violet2)'}}>{I.gpu} GPU & System</div></div>
          <div className="cb">
            {[['GPU',sys.gpu_name],['GPU Tier',`${sys.gpu_tier}/5 — ${TNAMES[sys.gpu_tier]||'?'}`],
              ['OS',sys.os],['Hostname',sys.hostname],['Arch',sys.arch],['Uptime',sys.uptime]]
              .map(([k,v])=><SR key={k} k={k} v={v}/>)}
          </div>
        </div>
      </div>
      <div className="grid g2">
        <div className="card">
          <div className="ch"><div className="ct" style={{color:'var(--yellow)'}}>{I.tmp} Temperatures</div></div>
          <div className="cb">
            {!Object.keys(stats.temps||{}).length
              ? <span style={{fontSize:10,color:'var(--txt2)'}}>No sensor data</span>
              : <div className="temp-grid">
                  {Object.entries(stats.temps||{}).map(([k,v])=>{
                    const c=v>85?'var(--red)':v>70?'var(--yellow)':'var(--green)';
                    return <div key={k} className="tp"><div className="tp-n">{k}</div><div className="tp-v" style={{color:c}}>{v}°</div></div>;
                  })}
                </div>
            }
          </div>
        </div>
        <div className="card">
          <div className="ch"><div className="ct" style={{color:'var(--orange)'}}>{I.hdd} Storage</div></div>
          <div className="cb">
            {(sys.disks||[]).map(d=>(
              <div key={d.mountpoint} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:10,color:'var(--txt1)'}}>{d.mountpoint} <span style={{color:'var(--txt2)',fontSize:9}}>({d.fstype})</span></span>
                  <span style={{fontSize:10,color:'var(--txt2)'}}>{d.used_gb}/{d.total_gb} GB</span>
                </div>
                <Bar value={d.percent} color={d.percent>85?'var(--red)':d.percent>70?'var(--yellow)':'var(--cyan)'}/>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── MONITOR ─────────────────────────────────────────────────────────────── */
function Monitor({sys,stats,cfg,fmtTemp}){
  const cpuH=useHist(stats.cpu||0),ramH=useHist(stats.ram||0),gpuH=useHist(stats.gpu||0);
  const showCores=cfg?.show_cores!==false;
  const showProcs=cfg?.show_procs!==false;
  const showNet=cfg?.show_network!==false;
  const fmt=fmtTemp||(t=>`${t}°C`);
  return (
    <div className="fade-in">
      <div className="ptitle">{I.cpu} Live Monitor</div>
      <div className="grid g3">
        <SparkCard title="CPU Usage" value={stats.cpu||0} history={cpuH}/>
        <SparkCard title="RAM Usage" value={stats.ram||0} history={ramH}/>
        <SparkCard title="GPU Usage" value={stats.gpu||0} history={gpuH}/>
      </div>
      <div className="grid g2">
        {showCores&&<div className="card">
          <div className="ch"><div className="ct" style={{color:'var(--cyan)'}}>{I.cpu} Per-Core</div>
            <span style={{fontSize:9,color:'var(--txt2)'}}>{sys.cpu_threads} threads</span>
          </div>
          <div className="cb">
            <div className="core-grid">
              {(stats.cpu_cores||[]).map((v,i)=>{
                const c=v>85?'var(--red)':v>60?'var(--yellow)':'var(--cyan)';
                return <div key={i} className="ci">
                  <div className="cid">C{i}</div>
                  <div className="cbar"><div className="cfill" style={{width:`${v}%`,background:c}}/></div>
                  <div className="cpct">{Math.round(v)}%</div>
                </div>;
              })}
            </div>
          </div>
        </div>}
        {showNet&&<div className="card">
          <div className="ch"><div className="ct" style={{color:'var(--yellow)'}}>{I.net} Network</div></div>
          <div className="cb">
            {[['↑ Upload',`${stats.net_up||0} KB/s`,'var(--cyan)'],
              ['↓ Download',`${stats.net_down||0} KB/s`,'var(--green)'],
              ['Sent',`${stats.net_sent_mb||0} MB`,''],
              ['Received',`${stats.net_recv_mb||0} MB`,'']
            ].map(([l,v,c])=>(
              <div key={l} className="net-row">
                <span className="nl">{l}</span>
                <span className="nv" style={{color:c||'var(--txt0)'}}>{v}</span>
              </div>
            ))}
            {stats.gpu_mem_total>0&&<>
              <div style={{height:1,background:'var(--border)',margin:'6px 0'}}/>
              <div className="net-row"><span className="nl">GPU VRAM</span>
                <span className="nv" style={{color:'var(--violet2)'}}>{stats.gpu_mem_used}/{stats.gpu_mem_total} MB</span></div>
              <div className="net-row"><span className="nl">GPU Temp</span>
                <span className="nv" style={{color:vCol(stats.gpu_temp,70,85)}}>{fmt(stats.gpu_temp)}</span></div>
            </>}
          </div>
        </div>}
      </div>
      {showProcs&&<div className="card">
        <div className="ch"><div className="ct" style={{color:'var(--cyan)'}}>{I.cpu} Top Processes</div></div>
        <div style={{overflowX:'auto'}}>
          <table className="proc-t">
            <thead><tr><th>PID</th><th>Name</th><th>CPU%</th><th>MEM%</th><th>Status</th></tr></thead>
            <tbody>
              {(stats.processes||[]).slice(0,parseInt(cfg?.proc_count)||8).map(p=>(
                <tr key={p.pid}>
                  <td style={{color:'var(--txt2)',fontSize:9}}>{p.pid}</td>
                  <td style={{fontFamily:'Rajdhani,sans-serif',fontSize:13,fontWeight:600}}>{p.name}</td>
                  <td style={{fontFamily:'Rajdhani,sans-serif',fontSize:13,color:p.cpu>50?'var(--red)':p.cpu>20?'var(--yellow)':'var(--txt0)'}}>{p.cpu}%</td>
                  <td style={{fontFamily:'Rajdhani,sans-serif',fontSize:12,color:'var(--txt1)'}}>{p.mem}%</td>
                  <td style={{fontSize:9,color:'var(--txt2)',letterSpacing:1}}>{p.status}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>}
    </div>
  );
}

/* ─── GAMES ───────────────────────────────────────────────────────────────── */

/* ─── AI ──────────────────────────────────────────────────────────────────── */
function AI({sys,stats}){
  const [key,setKey]=useState('');
  const [showK,setShowK]=useState(false);
  const [ptype,setPtype]=useState('general');
  const [out,setOut]=useState('');
  const [loading,setLoading]=useState(false);
  const [aiStatus,setAiStatus]=useState('');
  const [aiStype,setAiStype]=useState('');
  const [keySaveMsg,setKeySaveMsg]=useState('');
  const [chatQ,setChatQ]=useState('');
  const [chatOut,setChatOut]=useState('');
  const [chatLoading,setChatLoading]=useState(false);
  const outRef=useRef(null);
  const chatRef=useRef(null);

  useEffect(()=>{
    fetch(`${API}/config`).then(r=>r.json()).then(d=>{if(d.groq_api_key) setKey(d.groq_api_key);}).catch(()=>{});
  },[]);

  const saveKey=async()=>{
    setKeySaveMsg('Saving…');
    try{
      const r=await fetch(`${API}/config`,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({groq_api_key:key})});
      const d=await r.json();
      setKeySaveMsg(d.ok?'✓ Saved':'✗ '+( d.error||'Failed'));
    }catch(e){ setKeySaveMsg('✗ '+e.message); }
    setTimeout(()=>setKeySaveMsg(''),3000);
  };

  const doStream=async(url,body,setO,setL,setS,setSt,ref,header)=>{
    if(!key.trim()){setS('Enter API key first');setSt('s-err');return;}
    setL(true); setO(''); setS('Connecting…'); setSt('s-load');
    try{
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({api_key:key,...body})});
      if(!res.ok){const d=await res.json();setS(d.error||'Request failed');setSt('s-err');return;}
      setS('Generating…'); setSt('s-load');
      const reader=res.body.getReader(); const dec=new TextDecoder(); let buf=''; let done_flag=false;
      if(header) setO(header);
      while(!done_flag){
        const {done,value}=await reader.read(); if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split('\n'); buf=lines.pop()||'';
        for(const line of lines){
          if(!line.startsWith('data:')) continue;
          const p=line.slice(5).trim();
          if(p==='[DONE]'){done_flag=true;break;}
          try{
            const d=JSON.parse(p);
            if(d.error){setS(d.error);setSt('s-err');done_flag=true;break;}
            else if(d.text){setO(x=>x+d.text);if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;}
          }catch{}
        }
      }
      setS('✓ Done'); setSt('s-ok');
    }catch(e){setS('Error: '+e.message); setSt('s-err');}
    finally{setL(false);}
  };

  const run=()=>doStream(`${API}/groq`,{type:ptype},setOut,setLoading,setAiStatus,setAiStype,outRef,
    `◈ NovaPulse AI  ·  ${new Date().toLocaleTimeString()}  ·  ${ptype}\n${'─'.repeat(48)}\n\n`);

  const sendChat=()=>{
    if(!chatQ.trim()||chatLoading) return;
    const q=chatQ; setChatQ('');
    doStream(`${API}/groq/chat`,{question:q},setChatOut,setChatLoading,setAiStatus,setAiStype,chatRef,
      `◈ Q: ${q}\n${'─'.repeat(48)}\n\n`);
  };

  const opts=[
    {k:'general',e:'🔧',l:'General Optimization',d:'Broad tips for your hardware'},
    {k:'gaming', e:'🎮',l:'Gaming Performance',  d:`GPU Tier ${sys.gpu_tier}/5 focused`},
    {k:'thermal',e:'🌡️',l:'Thermal & Cooling',   d:'Temp analysis & cooling'},
    {k:'memory', e:'💾',l:'RAM & Storage',        d:'XMP, pagefile, drives'},
    {k:'windows',e:'🪟',l:'Windows Tweaks',       d:'Registry, startup, services'},
    {k:'power',  e:'⚡',l:'Power Settings',       d:'Power plans, CPU/GPU limits'},
  ];

  return (
    <div className="fade-in">
      <div className="ptitle">{I.ai} AI Optimizer</div>
      <div className="card" style={{marginBottom:12}}>
        <div className="ch">
          <div className="ct" style={{color:'var(--cyan)'}}>{I.ai} Groq API Key</div>
          <a href="https://console.groq.com" target="_blank" style={{fontSize:9,color:'var(--txt2)',textDecoration:'none'}}>Get free key →</a>
        </div>
        <div className="cb">
          <div className="key-row">
            <input className="key-in" type={showK?'text':'password'} placeholder="gsk_..." value={key}
              onChange={e=>setKey(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveKey()}/>
            <button className="key-btn" onClick={()=>setShowK(!showK)}>{showK?'Hide':'Show'}</button>
            <button className="key-btn" onClick={saveKey}>Save</button>
          </div>
          {keySaveMsg&&<div style={{fontSize:10,color:keySaveMsg.startsWith('✓')?'var(--green)':'var(--red)',marginBottom:6}}>{keySaveMsg}</div>}
          <div className={`status ${aiStype}`}>{aiStatus}</div>
        </div>
      </div>

      <div className="card" style={{marginBottom:12}}>
        <div className="ch"><div className="ct" style={{color:'var(--violet2)'}}>{I.chat} Ask a PC Question</div>
          <span style={{fontSize:9,color:'var(--txt2)'}}>PC topics only · Enter to send</span>
        </div>
        <div className="cb">
          <div className="chat-wrap">
            <div className="chat-row">
              <textarea className="chat-in" rows={2}
                placeholder="e.g. Is my CPU bottlenecking my GPU? Should I enable XMP? Best settings for CS2?"
                value={chatQ} onChange={e=>setChatQ(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}}/>
              <button className="chat-send" onClick={sendChat} disabled={chatLoading||!chatQ.trim()}>
                {chatLoading?<span className="spinner"/>:'SEND'}
              </button>
            </div>
            {chatOut&&<div ref={chatRef} className="ai-out" style={{minHeight:80,marginTop:8}}>{chatOut}</div>}
          </div>
        </div>
      </div>

      <div className="opt-grid">
        {opts.map(o=>(
          <button key={o.k} className={`opt-btn${ptype===o.k?' sel':''}`} onClick={()=>setPtype(o.k)}>
            <div style={{fontWeight:700,marginBottom:2}}>{o.e} {o.l}</div>
            <div style={{fontSize:8,color:'var(--txt2)'}}>{o.d}</div>
          </button>
        ))}
      </div>
      <button className="run-btn" onClick={run} disabled={loading}>
        {loading&&<span className="spinner"/>}
        {loading?'ANALYZING…':'▶  ANALYZE WITH GROQ AI'}
      </button>
      <div ref={outRef} className="ai-out">
        {out||<span style={{color:'var(--txt2)',fontSize:10}}>{'Results appear here after analysis…\n\nThe AI analyzes your exact hardware:\nGPU: '+sys.gpu_name+'\nCPU: '+sys.cpu_name}</span>}
      </div>
    </div>
  );
}

/* ─── HISTORY ─────────────────────────────────────────────────────────────── */
function History(){
  const [data,setData]=useState([]);
  const [window_,setWindow]=useState(60);
  const [width,setWidth]=useState(600);
  const wrapRef=useRef(null);
  const svgH=100, pad={l:30,r:8,t:10,b:20};

  useEffect(()=>{
    const go=()=>fetch(`${API}/history`).then(r=>r.json()).then(setData).catch(()=>{});
    go(); const id=setInterval(go,2000); return()=>clearInterval(id);
  },[]);

  useEffect(()=>{
    if(!wrapRef.current) return;
    const ro=new ResizeObserver(entries=>{
      const w=entries[0].contentRect.width;
      if(w>0) setWidth(Math.floor(w));
    });
    ro.observe(wrapRef.current);
    return()=>ro.disconnect();
  },[]);

  const slice=data.slice(-window_);
  const chartW=width-pad.l-pad.r;
  const chartH=svgH-pad.t-pad.b;

  const mkPath=(key)=>{
    if(slice.length<2) return null;
    const pts=slice.map((d,i)=>{
      const x=pad.l+(i/(slice.length-1))*chartW;
      const y=pad.t+chartH-(Math.min(100,d[key]||0)/100)*chartH;
      return [x,y];
    });
    const line='M '+pts.map(p=>p.join(',')).join(' L ');
    const fill=`M ${pad.l},${pad.t+chartH} L `+pts.map(p=>p.join(',')).join(' L ')+` L ${pad.l+chartW},${pad.t+chartH} Z`;
    return {line,fill};
  };

  const series=[
    {key:'cpu',col:'#00e5ff',label:'CPU'},
    {key:'ram',col:'#00e596',label:'RAM'},
    {key:'gpu',col:'#9f5ff7',label:'GPU'},
  ];
  const gridLines=[0,25,50,75,100];
  const last=slice[slice.length-1]||{cpu:0,ram:0,gpu:0};

  return (
    <div className="fade-in">
      <div className="ptitle">{I.hist} Performance History</div>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12,flexWrap:'wrap'}}>
        {[['1m',60],['2m',120],['5m',300]].map(([l,v])=>(
          <button key={v} className={`hist-btn${window_===v?' active':''}`} onClick={()=>setWindow(v)}>{l}</button>
        ))}
        <span style={{fontSize:9,color:'var(--txt2)',marginLeft:4}}>{slice.length} samples</span>
        <div style={{marginLeft:'auto',display:'flex',gap:14}}>
          {series.map(s=>(
            <div key={s.key} style={{display:'flex',alignItems:'center',gap:5}}>
              <div style={{width:10,height:3,background:s.col,borderRadius:1,flexShrink:0}}/>
              <span style={{fontSize:9,color:'var(--txt2)'}}>{s.label}</span>
              <span style={{fontFamily:'Rajdhani,sans-serif',fontSize:14,fontWeight:700,color:s.col}}>{last[s.key]||0}%</span>
            </div>
          ))}
        </div>
      </div>

      <div ref={wrapRef}>
        {series.map(s=>{
          const path=mkPath(s.key);
          const vals=slice.map(d=>d[s.key]||0);
          const avg=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
          const max=vals.length?Math.round(Math.max(...vals)):0;
          const min=vals.length?Math.round(Math.min(...vals)):0;
          return (
            <div key={s.key} className="hist-card">
              {/* Stats row — plain HTML, no stretching */}
              <div style={{display:'flex',gap:20,alignItems:'center',marginBottom:8,flexWrap:'wrap'}}>
                {[['Current',last[s.key]||0,s.col],['Avg',avg,'var(--txt1)'],['Peak',max,vCol(max)],['Min',min,'var(--txt2)']].map(([lbl,val,col])=>(
                  <div key={lbl} style={{display:'flex',flexDirection:'column',gap:1}}>
                    <span style={{fontSize:8,color:'var(--txt2)',textTransform:'uppercase',letterSpacing:1}}>{lbl}</span>
                    <span style={{fontFamily:'Rajdhani,sans-serif',fontSize:20,fontWeight:700,color:col,lineHeight:1}}>{val}%</span>
                  </div>
                ))}
                <span style={{marginLeft:'auto',fontFamily:'Rajdhani,sans-serif',fontSize:13,fontWeight:700,letterSpacing:2,color:s.col}}>{s.label}</span>
              </div>
              {/* SVG chart — exact pixel dimensions, no aspect ratio distortion */}
              <svg width={width} height={svgH} style={{display:'block',overflow:'visible'}}>
                {gridLines.map(v=>{
                  const y=pad.t+chartH*(1-v/100);
                  return <g key={v}>
                    <line x1={pad.l} y1={y} x2={pad.l+chartW} y2={y} stroke="var(--border)" strokeWidth=".5" strokeDasharray="3 5"/>
                    <text x={pad.l-4} y={y+3} textAnchor="end" fontSize="8" fill="var(--txt2)" fontFamily="Space Mono,monospace">{v}</text>
                  </g>;
                })}
                {path&&<>
                  <defs>
                    <linearGradient id={`hg${s.key}`} x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={s.col} stopOpacity=".2"/>
                      <stop offset="100%" stopColor={s.col} stopOpacity="0"/>
                    </linearGradient>
                  </defs>
                  <path d={path.fill} fill={`url(#hg${s.key})`}/>
                  <path d={path.line} fill="none" stroke={s.col} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
                </>}
                {/* Time labels — real pixel positions */}
                {slice.length>1&&[0,.25,.5,.75,1].map(f=>{
                  const idx=Math.floor(f*(slice.length-1));
                  const pt=slice[idx]; if(!pt) return null;
                  const x=pad.l+f*chartW;
                  const label=new Date(pt.t*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
                  return <text key={f} x={x} y={svgH-3} textAnchor="middle" fontSize="8" fill="var(--txt2)" fontFamily="Space Mono,monospace">{label}</text>;
                })}
              </svg>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── PROCESS MANAGER ─────────────────────────────────────────────────────── */
function ProcessManager(){
  const [procs,setProcs]=useState([]);
  const [search,setSearch]=useState('');
  const [sortKey,setSortKey]=useState('cpu');
  const [sortDir,setSortDir]=useState(-1);
  const [msg,setMsg]=useState('');
  const [msgCol,setMsgCol]=useState('var(--green)');
  const [prioPid,setPrioPid]=useState(null);

  useEffect(()=>{
    const go=()=>fetch(`${API}/processes`).then(r=>r.json()).then(setProcs).catch(()=>{});
    go(); const id=setInterval(go,2000); return()=>clearInterval(id);
  },[]);

  const flash=(txt,ok)=>{setMsg(txt);setMsgCol(ok?'var(--green)':'var(--red)');setTimeout(()=>setMsg(''),2500);};

  const kill=async(pid,name)=>{
    if(!window.confirm(`Kill "${name}" (PID ${pid})?`)) return;
    const r=await fetch(`${API}/processes/kill`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pid})});
    const d=await r.json();
    if(d.ok) flash(`✓ Killed ${name}`,'ok');
    else flash(`✗ ${d.error}`,'err');
  };

  const setPrio=async(pid,level)=>{
    const r=await fetch(`${API}/processes/priority`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pid,level})});
    const d=await r.json();
    if(d.ok) flash(`✓ Priority set to ${level}`,'ok');
    else flash(`✗ ${d.error}`,'err');
    setPrioPid(null);
  };

  const toggleSort=(k)=>{
    if(sortKey===k) setSortDir(d=>-d);
    else{setSortKey(k);setSortDir(-1);}
  };

  const filtered=procs
    .filter(p=>!search||p.name.toLowerCase().includes(search.toLowerCase())||String(p.pid).includes(search))
    .sort((a,b)=>sortDir*(((a[sortKey]??0)>(b[sortKey]??0))?1:-1));

  const Th=({k,l})=><th onClick={()=>toggleSort(k)}>{l} {sortKey===k?(sortDir<0?'▼':'▲'):''}</th>;

  return (
    <div className="fade-in">
      <div className="ptitle">{I.proc} Process Manager</div>
      {msg&&<div style={{color:msgCol,fontSize:10,marginBottom:8}}>{msg}</div>}
      <input className="pm-search" placeholder="Search by name or PID…" value={search} onChange={e=>setSearch(e.target.value)}/>
      <div style={{fontSize:9,color:'var(--txt2)',marginBottom:10}}>{filtered.length} processes · click column header to sort</div>
      <div style={{background:'var(--bg1)',border:'1px solid var(--border)',borderRadius:3,overflow:'hidden'}}>
        <div style={{overflowX:'auto',maxHeight:520,overflowY:'auto'}}>
          <table className="pm-table">
            <thead style={{position:'sticky',top:0,zIndex:1}}>
              <tr>
                <Th k="name" l="Process"/><Th k="pid" l="PID"/>
                <Th k="cpu" l="CPU %"/><Th k="mem" l="MEM %"/>
                <Th k="threads" l="Threads"/><Th k="status" l="Status"/>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(p=>(
                <tr key={p.pid}>
                  <td>
                    <div className="pm-name" title={p.exe||p.name}>{p.name}</div>
                    <div style={{fontSize:8,color:'var(--txt2)'}}>{p.user}</div>
                  </td>
                  <td><span style={{color:'var(--txt2)',fontSize:10}}>{p.pid}</span></td>
                  <td>
                    <span className="pm-val" style={{color:vCol(p.cpu*4)}}>{p.cpu}</span>
                    <div className="pm-bar"><div className="pm-fill" style={{width:`${Math.min(100,p.cpu*4)}%`,background:vCol(p.cpu*4)}}/></div>
                  </td>
                  <td>
                    <span className="pm-val" style={{color:vCol(p.mem*2)}}>{p.mem.toFixed(1)}</span>
                    <div className="pm-bar"><div className="pm-fill" style={{width:`${Math.min(100,p.mem*2)}%`,background:vCol(p.mem*2)}}/></div>
                  </td>
                  <td><span style={{fontSize:10,color:'var(--txt2)'}}>{p.threads}</span></td>
                  <td><span style={{fontSize:9,color:p.status==='running'?'var(--green)':'var(--txt2)'}}>{p.status}</span></td>
                  <td>
                    <div style={{display:'flex',gap:5,alignItems:'center'}}>
                      <button className="pm-btn" onClick={()=>kill(p.pid,p.name)}>Kill</button>
                      <div style={{position:'relative'}}>
                        <button className="pm-btn prio" onClick={()=>setPrioPid(prioPid===p.pid?null:p.pid)}>Prio</button>
                        {prioPid===p.pid&&(
                          <div style={{position:'absolute',top:'100%',right:0,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,zIndex:10,minWidth:100,marginTop:2}}>
                            {['realtime','high','abovenormal','normal','belownormal','idle'].map(l=>(
                              <div key={l} onClick={()=>setPrio(p.pid,l)}
                                style={{padding:'6px 10px',fontSize:9,cursor:'pointer',color:'var(--txt1)'}}
                                onMouseEnter={e=>e.target.style.color='var(--yellow)'}
                                onMouseLeave={e=>e.target.style.color='var(--txt1)'}>{l}</div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ─── SYSTEM CLEANER ──────────────────────────────────────────────────────── */
function Cleaner(){
  const [scan,setScan]=useState(null);
  const [loading,setLoading]=useState(false);
  const [cleaning,setCleaning]=useState(false);
  const [checked,setChecked]=useState({});
  const [result,setResult]=useState('');
  const [ramMsg,setRamMsg]=useState('');

  const doScan=async()=>{
    setLoading(true); setResult('');
    const d=await fetch(`${API}/cleaner/scan`).then(r=>r.json()).catch(()=>null);
    if(d){
      setScan(d);
      const init={};
      (d.dirs||[]).forEach(x=>{if(x.size_mb>0)init[x.path]=true;});
      setChecked(init);
    }
    setLoading(false);
  };

  const doClean=async()=>{
    const paths=Object.entries(checked).filter(([,v])=>v).map(([k])=>k);
    if(!paths.length){setResult('No folders selected.');return;}
    if(!window.confirm(`Clean ${paths.length} folder(s)? Files will be permanently deleted.`)) return;
    setCleaning(true);
    const d=await fetch(`${API}/cleaner/clean`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({paths})}).then(r=>r.json()).catch(()=>({error:'Request failed'}));
    setCleaning(false);
    if(d.error) setResult('✗ '+d.error);
    else{
      setResult(`✓ Freed ${d.freed_mb} MB`+(d.errors?.length?` (${d.errors.length} skipped)`:``));
      doScan();
    }
  };

  const flushRam=async()=>{
    setRamMsg('Flushing…');
    const d=await fetch(`${API}/cleaner/ram`,{method:'POST'}).then(r=>r.json()).catch(()=>({error:'Failed'}));
    if(d.ok) setRamMsg(`✓ Done · ${d.ram_free_gb} GB now free`);
    else setRamMsg('✗ '+d.error);
    setTimeout(()=>setRamMsg(''),4000);
  };

  const totalSel=scan?scan.dirs.filter(x=>checked[x.path]).reduce((a,x)=>a+x.size_mb,0):0;

  return (
    <div className="fade-in">
      <div className="ptitle">{I.clean} System Cleaner</div>

      {/* RAM Flush */}
      <div className="cl-ram-box">
        <div>
          <div style={{fontWeight:700,fontSize:11,marginBottom:3}}>⚡ RAM Flush</div>
          <div style={{fontSize:9,color:'var(--txt2)'}}>Free up memory by clearing process working sets</div>
          {ramMsg&&<div style={{fontSize:10,color:'var(--green)',marginTop:4}}>{ramMsg}</div>}
        </div>
        <button className="key-btn" onClick={flushRam} style={{padding:'8px 16px',fontSize:10}}>Flush RAM</button>
      </div>

      {/* Temp Files */}
      <div className="card" style={{marginBottom:10}}>
        <div className="ch">
          <div className="ct" style={{color:'var(--yellow)'}}>🗑 Temp & Cache Files</div>
          {scan&&<span style={{fontSize:9,color:'var(--txt2)'}}>{scan.dirs.filter(x=>x.size_mb>0).length} locations found</span>}
        </div>
        <div className="cb">
          {!scan&&<div style={{textAlign:'center',padding:'20px 0'}}>
            <button className="launcher-scan-btn" onClick={doScan} disabled={loading}>
              {loading?'Scanning…':'Scan for Junk Files'}
            </button>
          </div>}
          {scan&&<>
            {scan.dirs.map(x=>(
              <div key={x.path} className="cl-row">
                <input type="checkbox" className="cl-check"
                  checked={!!checked[x.path]} onChange={e=>setChecked(p=>({...p,[x.path]:e.target.checked}))}/>
                <div style={{flex:1}}>
                  <div className="cl-name">{x.name}</div>
                  <div style={{fontSize:8,color:'var(--txt2)',marginTop:1,wordBreak:'break-all'}}>{x.path}</div>
                </div>
                <span className="cl-count">{x.count} files</span>
                <span className="cl-size" style={{color:x.size_mb>100?'var(--red)':x.size_mb>10?'var(--yellow)':'var(--txt1)'}}>{x.size_mb>=1?x.size_mb.toFixed(1)+' MB':x.size_mb===0?'—':(x.size_mb*1024).toFixed(0)+' KB'}</span>
              </div>
            ))}
            <div className="cl-total">
              <span>Selected: <b style={{color:'var(--txt0)'}}>{totalSel.toFixed(1)} MB</b></span>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                {result&&<span style={{color:result.startsWith('✓')?'var(--green)':'var(--red)',fontSize:10}}>{result}</span>}
                <button className="key-btn" onClick={doScan} style={{fontSize:9}}>Rescan</button>
                <button className="run-btn" onClick={doClean} disabled={cleaning||!Object.values(checked).some(Boolean)} style={{padding:'8px 16px',fontSize:11}}>
                  {cleaning?'Cleaning…':'Clean Selected'}
                </button>
              </div>
            </div>
          </>}
        </div>
      </div>

      {/* Startup Items */}
      {scan&&scan.startup&&scan.startup.length>0&&(
        <div className="card">
          <div className="ch"><div className="ct" style={{color:'var(--violet2)'}}>🚀 Startup Programs</div>
            <span style={{fontSize:9,color:'var(--txt2)'}}>{scan.startup.length} items</span></div>
          <div className="cb">
            <div style={{fontSize:9,color:'var(--txt2)',marginBottom:8}}>These programs launch automatically with Windows. Disable unwanted ones via Task Manager → Startup tab.</div>
            {scan.startup.map((s,i)=>(
              <div key={i} className="startup-row">
                <span className="startup-hive">{s.hive}</span>
                <div>
                  <div style={{fontWeight:600,fontSize:10,marginBottom:2}}>{s.name}</div>
                  <div style={{fontSize:8,color:'var(--txt2)',wordBreak:'break-all'}}>{s.path}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── GAME LAUNCHER ───────────────────────────────────────────────────────── */
function Launcher(){
  const [games,setGames]=useState([]);
  const [loading,setLoading]=useState(false);
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('all');
  const [msg,setMsg]=useState('');
  const [launched,setLaunched]=useState(null);

  const scan=async()=>{
    setLoading(true); setMsg('');
    const d=await fetch(`${API}/launcher/scan`).then(r=>r.json()).catch(()=>[]);
    setGames(d); setLoading(false);
    if(d.length===0) setMsg('No installed games found. Is Steam installed?');
  };

  useEffect(()=>{scan();},[]);

  const launch=async(g)=>{
    setLaunched(g.id);
    const r=await fetch(`${API}/launcher/launch`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({launch:g.launch})}).then(r=>r.json()).catch(()=>({error:'Failed'}));
    setTimeout(()=>setLaunched(null),2000);
  };

  const sources=[...new Set(games.map(g=>g.source))];
  const filtered=games.filter(g=>{
    if(filter!=='all'&&g.source!==filter) return false;
    if(search&&!g.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  return (
    <div className="fade-in">
      <div className="ptitle">{I.launch} Game Launcher</div>

      <div className="gfilter" style={{marginBottom:14}}>
        <input style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border2)',color:'var(--txt0)',padding:'7px 11px',fontFamily:"'Space Mono',monospace",fontSize:10,outline:'none',borderRadius:2}}
          placeholder={`Search ${games.length} installed games…`} value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="pm-select" value={filter} onChange={e=>setFilter(e.target.value)}>
          <option value="all">All Sources</option>
          {sources.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <button className="launcher-scan-btn" onClick={scan} disabled={loading} style={{padding:'7px 14px',fontSize:11}}>
          {loading?'Scanning…':'Rescan'}
        </button>
      </div>

      {msg&&<div style={{color:'var(--txt2)',fontSize:10,marginBottom:10}}>{msg}</div>}

      {loading&&<div style={{color:'var(--txt2)',fontSize:10}}>Scanning Steam / Epic libraries…</div>}

      {!loading&&filtered.length===0&&games.length>0&&<div style={{color:'var(--txt2)',fontSize:10}}>No games match your filter.</div>}

      <div className="launcher-grid">
        {filtered.map(g=>(
          <div key={g.id} className="launcher-card" onClick={()=>launch(g)}>
            {g.img
              ? <img className="launcher-img" src={g.img} alt={g.name} loading="lazy" onError={e=>e.target.style.display='none'}/>
              : <div className="launcher-img" style={{display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>🎮</div>
            }
            <div className="launcher-name" title={g.name}>{g.name}</div>
            <div className="launcher-meta">
              <span className={`launcher-src ${g.source.toLowerCase()}`}>{g.source}</span>
              <span>{g.size_gb>0?g.size_gb+' GB':''}</span>
            </div>
            <div className="launcher-launch-btn">
              {launched===g.id?'LAUNCHING…':'▶ PLAY'}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── MONITORS ────────────────────────────────────────────────────────────── */
function Monitors(){
  const [mons,setMons]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    fetch(`${API}/monitors`).then(r=>r.json()).then(d=>{setMons(d);setLoading(false);}).catch(()=>setLoading(false));
  },[]);

  const resLabel=(w,h)=>{
    if(!w||!h) return '?';
    if(w>=3840) return '4K';
    if(w>=2560) return 'QHD';
    if(w>=1920) return 'FHD';
    if(w>=1280) return 'HD';
    return `${w}×${h}`;

  const diagInch=(wmm,hmm)=>{
    if(!wmm||!hmm) return null;

  return (
    <div className="fade-in">
      <div className="ptitle">{I.mon} Display & Monitors</div>

      <div className="mon-grid">

            {m.width&&m.height&&<div style={{fontSize:9,color:'var(--txt2)',marginBottom:8}}>{m.width} × {m.height}</div>}

                <rect x="5" y="5" width="110" height="55" rx="3" fill="none" stroke="var(--border2)" strokeWidth="1.5"/>
                <rect x="10" y="10" width="100" height="45" fill="var(--bg3)"/>
                {m.width&&m.height&&<>
                  <text x="60" y="36" textAnchor="middle" fill="var(--cyan)" fontSize="8" fontFamily="Rajdhani,sans-serif" fontWeight="700">{m.width}×{m.height}</text>
                  {m.refresh_hz&&<text x="60" y="46" textAnchor="middle" fill="var(--txt2)" fontSize="7" fontFamily="Space Mono,monospace">{m.refresh_hz}Hz</text>}
                </>}
                <rect x="50" y="60" width="20" height="4" rx="1" fill="var(--border2)"/>
                <rect x="30" y="64" width="60" height="3" rx="1" fill="var(--border2)"/>
              </svg>
            </div>

            <div className="mon-rows">
              {m.refresh_hz&&<div className="mon-row">Refresh Rate <span style={{color:'var(--green)'}}>{m.refresh_hz} Hz</span></div>}
              {diagInch(m.width_mm,m.height_mm)&&<div className="mon-row">Size <span>{diagInch(m.width_mm,m.height_mm)}"</span></div>}
              {m.vram_mb>0&&<div className="mon-row">VRAM <span>{m.vram_mb} MB</span></div>}
              {m.driver&&<div className="mon-row">Driver <span style={{fontSize:8}}>{m.driver}</span></div>}
              <div className="mon-row">Position <span>{m.x},{m.y}</span></div>
            </div>
          </div>
        ))}
      </div>

      {/* Desktop layout diagram */}
      {mons.length>1&&<div className="card">
        <div className="ch"><div className="ct">Desktop Layout</div></div>
        <div className="cb" style={{overflowX:'auto'}}>
          {(()=>{
            const maxX=Math.max(...mons.map(m=>(m.x||0)+(m.width||1920)));
            const maxY=Math.max(...mons.map(m=>(m.y||0)+(m.height||1080)));
            const scale=500/maxX;
            return(
              <svg viewBox={`0 0 ${maxX*scale+10} ${maxY*scale+10}`} style={{width:'100%',maxHeight:200}}>
                {mons.map((m,i)=>{
                  const x=(m.x||0)*scale+5, y=(m.y||0)*scale+5;
                  const w=(m.width||1920)*scale, h=(m.height||1080)*scale;
                  const col=m.is_primary?'var(--cyan)':'var(--border2)';
                  return<g key={i}>
                    <rect x={x} y={y} width={w} height={h} fill="var(--bg3)" stroke={col} strokeWidth="1.5" rx="2"/>
